<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quant Terminal | Guilherme Menezes</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
background:#02040a;
color:#e6e6e6;
overflow-x:hidden;
}

/* subtle animated grid */
.grid{
position:fixed;
inset:0;
background-image:
linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
background-size:60px 60px;
animation:moveGrid 20s linear infinite;
z-index:-2;
}

@keyframes moveGrid{
0%{transform:translateY(0);}
100%{transform:translateY(60px);}
}

/* darker particles canvas */
canvas#particles{
position:fixed;
inset:0;
z-index:-3;
opacity:0.4;
}

/* TICKER */
.ticker{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.8);
border-bottom:1px solid rgba(0,255,136,0.15);
overflow:hidden;
white-space:nowrap;
z-index:999;
backdrop-filter:blur(10px);
}

.ticker span{
display:inline-block;
padding:12px 40px;
color:#7CFFB2;
font-weight:500;
animation:scroll 35s linear infinite;
opacity:0.8;
}

@keyframes scroll{
0%{transform:translateX(100%);}
100%{transform:translateX(-100%);}
}

/* HERO */
.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:100px 20px;
}

.glass{
background:rgba(255,255,255,0.03);
border:1px solid rgba(0,255,136,0.08);
backdrop-filter:blur(18px);
border-radius:18px;
padding:40px;
box-shadow:0 0 60px rgba(0,255,136,0.05);
animation:fadeIn 2s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

h1{
font-size:3.2rem;
font-weight:800;
}

h1 span{
color:#7CFFB2;
text-shadow:0 0 15px rgba(0,255,136,0.2);
}

.subtitle{
margin-top:15px;
color:#9aa0a6;
min-height:30px;
font-size:1.1rem;
}

/* KPI */
.kpis{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:60px 20px;
max-width:1100px;
margin:auto;
}

.kpi{
background:rgba(255,255,255,0.02);
border:1px solid rgba(0,255,136,0.08);
padding:25px;
border-radius:14px;
text-align:center;
transition:0.4s;
position:relative;
overflow:hidden;
}

.kpi::after{
content:'';
position:absolute;
inset:0;
background:radial-gradient(circle at center, rgba(0,255,136,0.08), transparent 70%);
opacity:0;
transition:0.5s;
}

.kpi:hover::after{
opacity:1;
}

.kpi:hover{
transform:translateY(-5px);
border-color:rgba(0,255,136,0.2);
}

.kpi h2{
color:#7CFFB2;
font-size:2.2rem;
}

/* CHART */
.chart{
max-width:900px;
margin:60px auto;
padding:20px;
background:rgba(255,255,255,0.02);
border:1px solid rgba(0,255,136,0.08);
border-radius:14px;
}

canvas{
width:100%;
height:300px;
}

/* TERMINAL */
.terminal{
max-width:900px;
margin:60px auto;
background:#000;
border:1px solid rgba(0,255,136,0.15);
border-radius:10px;
padding:20px;
font-family:monospace;
color:#7CFFB2;
height:260px;
overflow:hidden;
position:relative;
}

.cursor{
display:inline-block;
width:8px;
background:#7CFFB2;
margin-left:4px;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0;}
}

/* SKILLS */
.skills{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.skill{
margin-bottom:15px;
}

.bar{
height:8px;
background:#0b0f14;
border-radius:10px;
overflow:hidden;
border:1px solid rgba(0,255,136,0.05);
}

.fill{
height:100%;
width:0;
background:linear-gradient(90deg,#0aff9d,#00ff88);
transition:2.5s;
}

/* fade scroll */
.fade{
opacity:0;
transform:translateY(25px);
transition:1.2s;
}

.fade.show{
opacity:1;
transform:translateY(0);
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
width:58px;
height:58px;
border-radius:50%;
background:#25D366;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
box-shadow:0 0 25px rgba(37,211,102,0.25);
animation:pulse 2.5s infinite;
z-index:999;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

</style>
</head>

<body>

<div class="grid"></div>
<canvas id="particles"></canvas>

<div class="ticker">
<span>
PETR4 ▲ 1.2% • VALE3 ▲ 0.8% • ITUB4 ▼ 0.3% • IBOV ▲ 0.9% • BTC ▲ 2.1% • SP500 ▲ 0.4% • USD ▼ 0.2%
</span>
</div>

<section class="hero">
<div class="glass">
<h1>Guilherme <span>Menezes</span></h1>
<div class="subtitle" id="typing"></div>
<p style="margin-top:20px;color:#8b949e;max-width:700px;">
Economia • Mercado Financeiro • Python • Data Analytics • Quant Research
</p>
</div>
</section>

<section class="kpis fade">
<div class="kpi"><h2 id="k1">0</h2><p>Projetos</p></div>
<div class="kpi"><h2 id="k2">0</h2><p>Modelos</p></div>
<div class="kpi"><h2 id="k3">0</h2><p>Scripts</p></div>
<div class="kpi"><h2 id="k4">0</h2><p>Backtests</p></div>
</section>

<div class="chart fade">
<canvas id="chart"></canvas>
</div>

<div class="terminal fade" id="terminal"></div>

<div class="skills fade">

<div class="skill">
<p>Python</p>
<div class="bar"><div class="fill" data="90%"></div></div>
</div>

<div class="skill">
<p>Data Analysis</p>
<div class="bar"><div class="fill" data="85%"></div></div>
</div>

<div class="skill">
<p>Finance</p>
<div class="bar"><div class="fill" data="92%"></div></div>
</div>

</div>

<a class="whatsapp" href="https://wa.me/5511981503387">💬</a>

<script>

/* typing slower (more premium feel) */
const texts=[
"Market Analyst",
"Quant Finance",
"Python Developer",
"Data Analytics",
"Investment Research"
];

let i=0,j=0,del=false;

function type(){
let txt=texts[i];

if(!del){
j++;
document.getElementById("typing").innerText=txt.slice(0,j);
if(j===txt.length){del=true;setTimeout(type,1400);return;}
}else{
j--;
document.getElementById("typing").innerText=txt.slice(0,j);
if(j===0){del=false;i=(i+1)%texts.length;}
}

setTimeout(type,90);
}
type();

/* KPIs slower + smoother */
function count(id,target){
let el=document.getElementById(id);
let c=0;
let inc=target/120;

let t=setInterval(()=>{
c+=inc;
if(c>=target){c=target;clearInterval(t);}
el.innerText=Math.floor(c);
},30);
}

count("k1",14);
count("k2",9);
count("k3",42);
count("k4",18);

/* SKILLS */
setTimeout(()=>{
document.querySelectorAll(".fill").forEach(f=>{
f.style.width=f.getAttribute("data");
});
},1200);

/* TERMINAL slow + realistic */
const lines=[
"> loading market data...",
"> running backtest...",
"Sharpe Ratio: 1.38",
"Max Drawdown: -7.9%",
"Volatility: 12.4%",
"> optimizing strategy...",
"✔ ready"
];

let t=0;
function terminal(){
if(t<lines.length){
document.getElementById("terminal").innerHTML+=lines[t]+"<br>";
t++;
setTimeout(terminal,1100);
}
}
terminal();

/* particles slower + darker */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];

for(let i=0;i<60;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
dx:(Math.random()-0.5)*0.3,
dy:(Math.random()-0.5)*0.3
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.dx;
p.y+=p.dy;

if(p.x<0)p.x=canvas.width;
if(p.y<0)p.y=canvas.height;

ctx.fillStyle="#0aff9d";
ctx.globalAlpha=0.25;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(draw);
}

draw();

/* chart MUCH slower */
const c=document.getElementById("chart").getContext("2d");
let data=Array.from({length:80},()=>50);

function drawChart(){

c.clearRect(0,0,900,300);

data.push(50+Math.sin(Date.now()/3000)*20+Math.random()*5);
data.shift();

c.beginPath();
c.strokeStyle="#7CFFB2";
c.lineWidth=1.5;

data.forEach((v,i)=>{
let x=i*(900/80);
let y=300-v*2;

if(i===0)c.moveTo(x,y);
else c.lineTo(x,y);
});

c.stroke();

setTimeout(drawChart,120); // SLOW MARKET FEEL
}

drawChart();

/* fade scroll */
const obs=new IntersectionObserver(e=>{
e.forEach(x=>{
if(x.isIntersecting)x.target.classList.add("show");
});
});

document.querySelectorAll(".fade").forEach(el=>obs.observe(el));

</script>

</body>
</html>
